<h3>{{ selectedBlockIndex >= 0 ? ('BUILDER.EDIT_BLOCK' | translate) : ('BUILDER.ADD_BLOCK' | translate) }}</h3>

<div class="form-field">
  <label>{{ 'BUILDER.BLOCK_TYPE' | translate }}</label>
  <div class="type-chips">
    @for (t of BLOCK_TYPES; track t) {
      <button class="type-chip" [class.active]="editType === t"
              [style.--chip-color]="blockColor({type: t})"
              (click)="onTypeSelect(t)">
        {{ t }}
      </button>
    }
  </div>
</div>

<div class="form-field">
  <label>{{ 'BUILDER.LABEL' | translate }}</label>
  <input type="text" [ngModel]="editLabel" (ngModelChange)="editLabel = $event; editLabelChange.emit($event)" [placeholder]="editType" />
</div>

<div class="form-row-2">
  <div class="form-field">
    <label>{{ 'BUILDER.DURATION_MIN' | translate }}</label>
    <input type="number" [ngModel]="editDurationMin" (ngModelChange)="editDurationMin = $event; editDurationMinChange.emit($event)" min="0" />
  </div>
  <div class="form-field">
    <label>{{ 'BUILDER.DURATION_SEC' | translate }}</label>
    <input type="number" [ngModel]="editDurationSec" (ngModelChange)="editDurationSec = $event; editDurationSecChange.emit($event)" min="0" max="59" />
  </div>
</div>

<div class="form-field">
  <label>{{ 'BUILDER.DISTANCE_M' | translate }}</label>
  <input type="number" [ngModel]="editDistanceMeters" (ngModelChange)="editDistanceMeters = $event; editDistanceMetersChange.emit($event)" min="0" [placeholder]="'BUILDER.OPTIONAL' | translate" />
</div>

@if (!hideIntensity()) {
  @if (isRamp()) {
    <div class="form-row-2">
      <div class="form-field">
        <label>{{ 'BUILDER.INTENSITY_START' | translate }}</label>
        <input type="number" [ngModel]="editIntensityStart" (ngModelChange)="editIntensityStart = $event; editIntensityStartChange.emit($event)" min="0" max="250" />
      </div>
      <div class="form-field">
        <label>{{ 'BUILDER.INTENSITY_END' | translate }}</label>
        <input type="number" [ngModel]="editIntensityEnd" (ngModelChange)="editIntensityEnd = $event; editIntensityEndChange.emit($event)" min="0" max="250" />
      </div>
    </div>
  } @else {
    <div class="form-field">
      <label>{{ 'BUILDER.INTENSITY_PCT' | translate }}</label>
      <input type="number" [ngModel]="editIntensity" (ngModelChange)="editIntensity = $event; editIntensityChange.emit($event)" min="0" max="250" />
    </div>
  }
}

<div class="form-row-2">
  <div class="form-field">
    <label>{{ 'BUILDER.CADENCE' | translate }}</label>
    <input type="number" [ngModel]="editCadence" (ngModelChange)="editCadence = $event; editCadenceChange.emit($event)" min="0" [placeholder]="'BUILDER.OPTIONAL' | translate" />
  </div>
  <div class="form-field">
    <label>{{ 'BUILDER.ZONE' | translate }}</label>
    <input type="text" [ngModel]="editZone" (ngModelChange)="editZone = $event; editZoneChange.emit($event)" [placeholder]="'BUILDER.ZONE_PLACEHOLDER' | translate" />
  </div>
</div>

@if (selectedBlockIndex >= 0) {
  <button class="btn-primary full-width" (click)="update.emit()">{{ 'BUILDER.UPDATE_BLOCK' | translate }}</button>
  <button class="btn-ghost full-width" (click)="deselect.emit()" style="margin-top: 0.35rem">{{ 'BUILDER.DESELECT' | translate }}</button>
} @else {
  <button class="btn-primary full-width" (click)="add.emit()">{{ 'BUILDER.ADD_BLOCK_BTN' | translate }}</button>
}
