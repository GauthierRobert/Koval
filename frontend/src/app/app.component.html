    <div class="app-container">
      <main class="main-content">
        <app-top-bar></app-top-bar>
        <div class="page-content">
          <router-outlet></router-outlet>
        </div>
      </main>

      <!-- Global Overlays -->
      @if (showDeviceManager$ | async) {
        <app-device-manager></app-device-manager>
      }
      @if (showSettings$ | async) {
        <app-settings></app-settings>
      }

      <!-- Live Workout Overlay -->
      @if ((executionState$ | async)?.isActive || (executionState$ | async)?.finalSummary) {
        <app-live-dashboard></app-live-dashboard>
      }

      <!-- Push Notification Toasts -->
      <app-notification-toast></app-notification-toast>

      <!-- Error Toasts -->
      <app-error-toast></app-error-toast>
    </div>
