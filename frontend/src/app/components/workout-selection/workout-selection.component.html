<div class="selection-layout">
  <app-sidebar></app-sidebar>

  <main class="selection-main">

    <!-- Sticky filter bar -->
    <div class="filter-bar">
      <!-- Tag filter -->
      <div class="filter-group" *ngIf="(trainingService.availableTags$ | async)?.length">
        <span
          class="filter-pill"
          [class.selected]="(trainingService.activeTagFilter$ | async) === '__mine__'"
          (click)="setTagFilter('__mine__')">My Workouts</span>
        <span
          *ngFor="let tag of trainingService.availableTags$ | async"
          class="filter-pill"
          [class.selected]="(trainingService.activeTagFilter$ | async) === tag"
          (click)="setTagFilter(tag)">{{ tag }}</span>
        <div class="filter-sep"></div>
      </div>

      <!-- Sport filter -->
      <div class="filter-group">
        <span
          *ngFor="let s of sportOptions"
          class="filter-pill"
          [class.selected]="(trainingService.activeSportFilter$ | async) === s.value"
          (click)="setSportFilter(s.value)">{{ s.label }}</span>
      </div>

      <div class="filter-sep"></div>

      <!-- Type filter -->
      <div class="filter-group">
        <span
          *ngFor="let type of trainingTypes"
          class="filter-pill"
          [class.selected]="(trainingService.activeTypeFilter$ | async) === type"
          [style.--pill-color]="getTypeColor(type)"
          (click)="setTypeFilter(type)">{{ getTypeLabel(type) }}</span>
      </div>
    </div>

    <!-- Content area -->
    <div class="content-area">

      <!-- Workout visualization -->
      <app-workout-visualization *ngIf="selectedTraining$ | async as training"
        [training]="training"></app-workout-visualization>

      <!-- Hero fallback — only when nothing selected -->
      <div class="empty-state" *ngIf="!(selectedTraining$ | async)">
        <div class="hero-content glass">
          <h1>Training Library</h1>
          <p>
            Select a workout from the sidebar to view its details, or chat with the Assistant to
            generate a new training plan tailored to your profile.
          </p>
          <button class="cta-btn" routerLink="/chat">Chat with Assistant</button>
        </div>
      </div>
    </div>
  </main>
</div>
