<div class="feed-tab">
  <ng-container *ngIf="feed$ | async as feed">
    <div class="feed-list" *ngIf="feed.length > 0; else emptyFeed">
      <div *ngFor="let activity of feed" class="feed-item glass">
        <span class="feed-icon">{{ getActivityIcon(activity.type) }}</span>
        <div class="feed-content">
          <p class="feed-text">{{ getActivityText(activity.type, activity.actorName || activity.actorId, activity.targetTitle) }}</p>
          <span class="feed-time">{{ formatDate(activity.occurredAt) }}</span>
        </div>
      </div>
    </div>
    <ng-template #emptyFeed>
      <div class="empty-tab">
        <span>📭</span>
        <p>No activity yet. Be the first to do something!</p>
      </div>
    </ng-template>
  </ng-container>
</div>
