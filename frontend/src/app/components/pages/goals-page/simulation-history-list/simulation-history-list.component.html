<div class="detail-simulate">
  <button class="btn-simulate" (click)="simulate.emit()">&#9889; {{ 'GOALS.BTN_SIMULATE_RACE' | translate }}</button>
  @if (simRequests.length > 0) {
    <div class="sim-history">
      <span class="detail-section-label">{{ 'GOALS.SECTION_PAST_SIMULATIONS' | translate }}</span>
      @for (req of simRequests; track req.id) {
        <div class="sim-request-item">
          <div class="sim-info">
            <span class="sim-label">{{ formatSimLabel(req) }}</span>
            <span class="sim-date">{{ formatSimDate(req.createdAt) }}</span>
          </div>
          <div class="sim-actions">
            <button class="btn-sm" (click)="rerun.emit(req)">{{ 'GOALS.BTN_RERUN' | translate }}</button>
            <button class="btn-sm delete" (click)="deleteReq.emit(req)">&#215;</button>
          </div>
        </div>
      }
    </div>
  }
</div>
