<div
  class="block-item"
  cdkDrag
  [class.selected]="isSelected"
  [class.set-selected]="isSelectedForSet"
  (click)="blockSelect.emit(index)"
>
  <button
    type="button"
    class="set-select-checkbox"
    [class.checked]="isSelectedForSet"
    [attr.aria-checked]="isSelectedForSet"
    role="checkbox"
    (click)="selectForSet.emit(index); $event.stopPropagation()"
    [title]="'BUILDER.SELECT_FOR_SET' | translate"
  >
    @if (isSelectedForSet) {
      <svg
        width="12"
        height="12"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="20 6 9 17 4 12" />
      </svg>
    }
  </button>
  <div class="block-drag-handle" cdkDragHandle>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <circle cx="8" cy="6" r="2" />
      <circle cx="16" cy="6" r="2" />
      <circle cx="8" cy="12" r="2" />
      <circle cx="16" cy="12" r="2" />
      <circle cx="8" cy="18" r="2" />
      <circle cx="16" cy="18" r="2" />
    </svg>
  </div>
  <div class="block-color-bar" [style.background]="blockColor"></div>
  <div class="block-info">
    <span class="block-label">{{ block.label || block.type }}</span>
    <span class="block-meta">
      {{ formatBlockDuration(block) }}
      @if (block.intensityTarget) {
        · {{ block.intensityTarget }}%
      }
      @if (block.intensityStart && block.intensityEnd) {
        · {{ block.intensityStart }}% → {{ block.intensityEnd }}%
      }
    </span>
  </div>
  <div class="block-actions">
    <button
      class="block-action-btn"
      (click)="duplicate.emit(index); $event.stopPropagation()"
      [title]="'BUILDER.DUPLICATE' | translate"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <rect x="9" y="9" width="13" height="13" rx="2" />
        <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
      </svg>
    </button>
    <button
      class="block-action-btn delete"
      (click)="remove.emit(index); $event.stopPropagation()"
      [title]="'COMMON.DELETE' | translate"
    >
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>
</div>
