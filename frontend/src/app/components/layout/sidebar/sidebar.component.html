<aside class="sidebar glass">
  <div class="sidebar-header">
    <h3 class="sidebar-title">WORKOUTS</h3>
  </div>
  <div class="sidebar-content">
    <app-training-history></app-training-history>
  </div>
  <div class="sidebar-footer">
    <div class="simulation-panel">
      <label class="switch">
        <input type="checkbox" (change)="toggleSimulation($event)" />
        <span class="slider round"></span>
      </label>
      <span class="toggle-label">Simulate Trainer</span>
    </div>
    @if (user$ | async; as user) {
      @if (user.role === 'ATHLETE') {
        <div class="join-section">
          <span class="join-title">JOIN A TEAM</span>
          <div class="join-row">
            <input class="join-input" [(ngModel)]="inviteCode" (keydown.enter)="redeemCode()" placeholder="CODE"
              maxlength="8" />
            <button class="join-btn" (click)="redeemCode()" [disabled]="(joining$ | async) || !inviteCode.trim()">
              {{ (joining$ | async) ? '...' : 'JOIN' }}
            </button>
          </div>
          @if (joinError) {
            <span class="join-error">{{ joinError }}</span>
          }
        </div>
      }
    }
  </div>
</aside>
