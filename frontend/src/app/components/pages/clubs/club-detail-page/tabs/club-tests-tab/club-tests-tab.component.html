@if (view === 'list') {
  <app-test-list
    [club]="club"
    [tests]="(tests$ | async) ?? []"
    [isCoach]="isCoach()"
    [loading]="(loading$ | async) ?? false"
    (open)="openTest($event)"
  />
} @else if (view === 'detail' && selectedTestId) {
  <app-test-detail
    [club]="club"
    [testId]="selectedTestId"
    [isCoach]="isCoach()"
    (back)="backToList()"
  />
}
