<div class="selection-layout">
  <app-sidebar></app-sidebar>

  <main class="selection-main">

    <div class="header glass">
      <div class="header-left">
        <div class="header-avatar">T</div>
        <div class="header-info">
          <span class="header-title">TRAINING <span class="dim">LIBRARY</span></span>
          <span class="header-subtitle">Browse and manage your workouts</span>
        </div>
      </div>
      <div class="header-right">
        <button class="tab-btn tab-btn--ai tab-btn--ai-background" (click)="showAiModal = true">✨ CREATE WITH AI</button>
      </div>
    </div>

    <!-- Sticky filter bar -->
    <div class="filter-bar">
      <!-- Source selector -->
      <div class="filter-group">
        <app-filter-pills
          [options]="sourceOptions"
          [selected]="(trainingService.activeSource$ | async) ?? 'mine'"
          (selectionChange)="onSourceChange($event)">
        </app-filter-pills>
        <div class="filter-sep"></div>
      </div>

      <!-- Tag filter (mine source only) -->
      <div class="filter-group" *ngIf="(trainingService.activeSource$ | async) === 'mine' && (trainingService.availableTags$ | async)?.length">
        <app-filter-pills
          [options]="(tagOptions$ | async) ?? []"
          [selected]="(trainingService.activeTagFilter$ | async) ?? null"
          (selectionChange)="setTagFilter($event)">
        </app-filter-pills>
        <div class="filter-sep"></div>
      </div>

      <!-- Club Group filter (club source only) -->
      <div class="filter-group" *ngIf="(trainingService.activeSource$ | async) === 'club' && (clubGroupOptions$ | async)?.length">
        <app-filter-pills
          [options]="(clubGroupOptions$ | async) ?? []"
          [selected]="(trainingService.activeClubGroupFilter$ | async) ?? null"
          (selectionChange)="onClubGroupChange($event)">
        </app-filter-pills>
        <div class="filter-sep"></div>
      </div>

      <!-- Sport filter -->
      <div class="filter-group">
        <app-filter-pills
          [options]="sportOptions"
          [selected]="(trainingService.activeSportFilter$ | async) ?? null"
          (selectionChange)="onSportChange($event)">
        </app-filter-pills>
      </div>

      <div class="filter-sep"></div>

      <!-- Type filter -->
      <div class="filter-group">
        <app-filter-pills
          [options]="typeOptions"
          [selected]="(trainingService.activeTypeFilter$ | async) ?? null"
          (selectionChange)="onTypeChange($event)">
        </app-filter-pills>
      </div>
    </div>

    <!-- AI modal -->
    <app-create-with-ai-modal
      [isOpen]="showAiModal"
      actionType="TRAINING_FROM_NOTATION"
      [context]="{}"
      label="Create Training with AI"
      (closed)="showAiModal = false"
      (created)="onAiCreated($event)">
    </app-create-with-ai-modal>

    <!-- Content area -->
    <div class="content-area">

      <!-- Workout visualization -->
      <app-workout-visualization *ngIf="selectedTraining$ | async as training"
        [training]="training"></app-workout-visualization>

      <!-- Hero fallback — only when nothing selected -->
      <div class="empty-state" *ngIf="!(selectedTraining$ | async)">
        <div class="hero-content glass">
          <h1>Training Library</h1>
          <p>
            Select a workout from the sidebar to view its details, or chat with the Assistant to
            generate a new training plan tailored to your profile.
          </p>
          <button class="cta-btn" routerLink="/chat">Chat with Assistant</button>
        </div>
      </div>
    </div>
  </main>
</div>
