steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/training-planner-backend', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/training-planner-backend']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'training-planner-backend'
      - '--image=gcr.io/$PROJECT_ID/training-planner-backend'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--memory=512Mi'
      - '--set-env-vars'
      - 'CLUB_FEED_BROKER_TYPE=pubsub,GCP_PROJECT_ID=$PROJECT_ID'
      - '--update-secrets'
      - 'ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,JWT_SECRET=JWT_SECRET:latest,STRAVA_CLIENT_ID=STRAVA_CLIENT_ID:latest,STRAVA_CLIENT_SECRET=STRAVA_CLIENT_SECRET:latest,MONGODB_URI=MONGODB_URI:latest'

substitutions:
  _REGION: europe-west1

images:
  - 'gcr.io/$PROJECT_ID/training-planner-backend'
