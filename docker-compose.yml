services:
  mongodb:
    image: mongo:7
    container_name: training-planner-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: training-planner-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: training-planner-pubsub
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=local-dev
    ports:
      - "8085:8085"

