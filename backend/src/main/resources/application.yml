spring:
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  application:
    name: training-planner-backend
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.7
          max-tokens: 4096
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 2s
        multiplier: 2
        max-interval: 10s
    mcp:
      server:
        name: koval-training-planner
        version: 1.0.0
        type: SYNC
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /mcp/sse
    chat:
      memory:
        repository:
          mongo:
            create-indices: true
            ttl: 0  # indefinite storage
  mongodb:
    port: 27017
    database: training-planner
    host: localhost

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

club-feed:
  broker:
    type: ${CLUB_FEED_BROKER_TYPE:none} # rabbitmq, pubsub, none
    pubsub:
      project-id: ${GCP_PROJECT_ID:}
      topic: club-feed-events

# Google Cloud Storage for user-uploaded media (photos)
# Authentication uses GOOGLE_APPLICATION_CREDENTIALS env var
# (Workload Identity in GKE/Cloud Run, JSON key file in dev).
storage:
  gcs:
    enabled: ${GCS_MEDIA_ENABLED:false}
    bucket: ${GCS_MEDIA_BUCKET:koval-media-dev}
    project-id: ${GCP_PROJECT_ID:local-dev}
    # When set, uses the local emulator (fake-gcs-server) with anonymous creds.
    # Set to http://localhost:4443 to talk to the docker-compose `fake-gcs` service.
    endpoint-url: ${GCS_MEDIA_ENDPOINT:}
    # Path to a service-account JSON key file. Required for V4 URL signing
    # when ADC returns user creds (e.g. `gcloud auth application-default login`).
    credentials-path: ${GCS_MEDIA_CREDENTIALS_PATH:}
    # Service-account email to impersonate via IAM signBlob for V4 URL signing.
    # Use in Cloud Run / GKE where the runtime credentials lack a private key.
    # Runtime SA needs roles/iam.serviceAccountTokenCreator on this target SA.
    signer-service-account: ${GCS_MEDIA_SIGNER_SA:}
    signed-url-upload-ttl: PT15M
    signed-url-read-ttl: PT24H
    max-upload-size-bytes: 26214400     # 25 MB (covers PDF training plans)
    allowed-content-types: >-
      image/jpeg,image/png,image/webp,image/heic,image/gif,
      application/pdf,
      application/msword,
      application/vnd.openxmlformats-officedocument.wordprocessingml.document,
      application/vnd.ms-excel,
      application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,
      application/vnd.ms-powerpoint,
      application/vnd.openxmlformats-officedocument.presentationml.presentation,
      text/plain,text/csv
    unconfirmed-retention: PT24H        # purge unconfirmed Media after 24h

server:
  port: 8080

# Strava OAuth2 Configuration
# Create your app at: https://www.strava.com/settings/api
strava:
  client-id: ${STRAVA_CLIENT_ID:}
  client-secret: ${STRAVA_CLIENT_SECRET:}
  redirect-uri: http://localhost:4200/auth/callback
  webhook-verify-token: ${STRAVA_WEBHOOK_VERIFY_TOKEN:strava-webhook-verify}
  webhook-callback-url: ${STRAVA_WEBHOOK_CALLBACK_URL:http://localhost:8080/api/integration/strava/webhook}

admin:
  secret: ${ADMIN_SECRET}

garmin:
  consumer-key: ${GARMIN_CONSUMER_KEY:}
  consumer-secret: ${GARMIN_CONSUMER_SECRET:}
  redirect-uri: http://localhost:4200/auth/garmin/callback

zwift:
  enabled: ${ZWIFT_ENABLED:false}

# Terra Integration (aggregator for Nolio activity ingest)
# https://docs.tryterra.co
terra:
  dev-id: ${TERRA_DEV_ID:}
  api-key: ${TERRA_API_KEY:}
  signing-secret: ${TERRA_SIGNING_SECRET:}
  api-base-url: ${TERRA_API_BASE_URL:https://api.tryterra.co/v2}
  widget-success-redirect-url: ${TERRA_WIDGET_SUCCESS_URL:http://localhost:4200/settings/integrations?terra=success}
  widget-failure-redirect-url: ${TERRA_WIDGET_FAILURE_URL:http://localhost:4200/settings/integrations?terra=failure}

# Nolio direct OAuth (write path - push trainings to Nolio account)
nolio:
  client-id: ${NOLIO_CLIENT_ID:}
  client-secret: ${NOLIO_CLIENT_SECRET:}
  auth-url: ${NOLIO_AUTH_URL:}
  token-url: ${NOLIO_TOKEN_URL:}
  api-base-url: ${NOLIO_API_BASE_URL:}
  redirect-uri: ${NOLIO_REDIRECT_URI:http://localhost:4200/auth/nolio/callback}
  scope: ${NOLIO_SCOPE:workouts:write}

# Google OAuth2 Configuration
# Create your app at: https://console.cloud.google.com/apis/credentials
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  client-secret: ${GOOGLE_CLIENT_SECRET:}
  redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:4200/auth/google/callback}
  mobile-callback-uri: ${GOOGLE_MOBILE_CALLBACK_URI:http://localhost:8080/api/auth/google/mobile-callback}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  # 30 days — long-lived session. Override with JWT_EXPIRATION (ms) per-env.
  expiration: ${JWT_EXPIRATION:2592000000}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# Firebase Cloud Messaging (FCM HTTP v1 API)
firebase:
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}

# AI debug flags
app:
  ai:
    debug-calls: true
    log-prompts: false
    toon-responses: false

# Logging Configuration
logging:
  level:
    # Suppress "Unhandled event type" warnings from Anthropic streaming
    org.springframework.ai.anthropic.api.AnthropicApi: INFO
    org.springframework.ai.anthropic: INFO
    org.springframework.ai: INFO
    # Keep INFO level for application code
    com.example.trainingplannerbackend: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    rabbit:
      enabled: false
    mongodb:
      enabled: false
  metrics:
    tags:
      application: training-planner-ai
  prometheus:
    metrics:
      export:
        enabled: true

oauth:
  issuer: ${OAUTH_ISSUER:http://localhost:8080}
