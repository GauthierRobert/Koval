<div class="gpx-with-loops">
  <div class="gpx-dropzone-labeled">
    @if (label) {
      <span class="dropzone-label">{{ label }}</span>
    }
    <div
      class="gpx-dropzone"
      [class.dragging]="isDragging"
      [class.has-file]="hasFile"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      (drop)="onDrop($event)"
      (click)="fileInput.click()"
    >
      <input #fileInput type="file" accept=".gpx" hidden (change)="onFileInput($event)" />
      @if (!hasFile) {
        <svg width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      }
      @if (!hasFile && hint) {
        <span>{{ hint }}</span>
      }
      @if (hasFile) {
        <span class="file-name">{{ fileName }}</span>
      }
    </div>
  </div>
  @if (showLoops) {
    <div class="loop-input">
      <label>{{ 'PACING.LOOPS_LABEL' | translate }}</label>
      <input type="number" [ngModel]="loops" (ngModelChange)="onLoopsChange($event)" min="1" max="50" />
    </div>
  }
</div>
