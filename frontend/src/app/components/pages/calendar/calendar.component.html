<div class="calendar-layout">
  <div class="header">
    <h1>Training <span class="highlight">Calendar</span></h1>
    <div class="header-right">
      <div class="prefs-wrapper">
        <button class="prefs-btn" (click)="togglePrefsDropdown()" title="Filter club sessions">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
          </svg>
        </button>
        <div class="prefs-dropdown" *ngIf="showPrefsDropdown">
          <div class="prefs-header">Club Sessions Filter</div>
          <div *ngIf="!myClubRoles.length" class="prefs-empty">No clubs joined</div>
          <div *ngFor="let role of myClubRoles" class="prefs-club-row">
            <label class="prefs-toggle">
              <input type="checkbox" [checked]="isClubVisible(role.clubId)" (change)="toggleClub(role.clubId)">
              <span class="prefs-club-name">{{ role.clubName }}</span>
            </label>
            <div *ngIf="clubGroupsMap.get(role.clubId)?.length" class="prefs-groups">
              <div *ngFor="let group of clubGroupsMap.get(role.clubId)" class="prefs-group-row">
                <label class="prefs-toggle">
                  <input type="checkbox" [checked]="isGroupVisible(group.id)" (change)="toggleGroup(group.id)">
                  <span class="prefs-group-name">{{ group.name }}</span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>
<div class="view-selector">
        <button [class.active]="viewMode === 'week'" (click)="setViewMode('week')">Week</button>
        <button [class.active]="viewMode === 'month'" (click)="setViewMode('month')">Month</button>
      </div>
      <div class="nav-controls">
        <button (click)="navigateWeek(-1)">&lt; {{ viewMode === 'week' ? 'Prev' : 'Last Month' }}</button>
        <button class="today-btn" (click)="goToToday()">TODAY</button>
        <span class="date-range" *ngIf="viewMode === 'week'">{{ startDate | date : 'MMM d' }} - {{ endDate | date : 'MMM d, y' }}</span>
        <span class="date-range" *ngIf="viewMode === 'month'">{{ startDate | date : 'MMMM yyyy' }}</span>
        <button (click)="navigateWeek(1)">{{ viewMode === 'week' ? 'Next' : 'Next Month' }} &gt;</button>
      </div>
    </div>
  </div>

  <ng-container *ngIf="entriesByDay$ | async as ebd">
    <app-calendar-week-view *ngIf="viewMode === 'week'"
      [days]="weekDays"
      [entriesByDay]="ebd"
      [workoutsByDay]="(scheduleByDay$ | async) || emptyMap"
      [goalsByDay]="(goalsByDay$ | async) || emptyGoalsMap"
      (addDay)="openScheduleModal($event)"
      (workoutSelected)="selectWorkout($event)"
      (sessionSelected)="selectSession($event)"
      (complete)="markComplete($event)"
      (skip)="markSkipped($event)"
      (workoutDeleted)="deleteWorkout($event)"
      (dropped)="onDrop($event.drop, $event.day)"
      (linked)="reload$.next()"
      (joinClubSession)="joinClubSession($event)"
      (cancelClubSession)="cancelClubSession($event)">
    </app-calendar-week-view>

    <app-calendar-month-view *ngIf="viewMode === 'month'"
      [days]="monthDays"
      [entriesByDay]="ebd"
      [startDate]="startDate"
      [goalsByDay]="(goalsByDay$ | async) || emptyGoalsMap"
      (addDay)="openScheduleModal($event)"
      (workoutSelected)="selectWorkout($event)"
      (sessionSelected)="selectSession($event)"
      (dropped)="onDrop($event.drop, $event.day)"
      (joinClubSession)="joinClubSession($event)"
      (cancelClubSession)="cancelClubSession($event)">
    </app-calendar-month-view>
  </ng-container>
</div>

<app-schedule-modal [isOpen]="isScheduleModalOpen" [preselectedDate]="selectedDate" mode="athlete"
  (closed)="isScheduleModalOpen = false" (scheduled)="onScheduled()"></app-schedule-modal>

<app-workout-detail-modal [workout]="selectedWorkout" (closed)="onDetailClosed()" (started)="onDetailStarted()"
  (statusChanged)="onDetailStatusChanged()"></app-workout-detail-modal>
