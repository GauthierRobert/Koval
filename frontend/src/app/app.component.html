<div class="app-container">
  <main class="main-content">
    <app-top-bar />
    <div class="page-content">
      <router-outlet />
    </div>
  </main>

  <!-- Global Overlays -->
  @if (showDeviceManager$ | async) {
    <app-device-manager />
  }
  @if (showSettings$ | async) {
    <app-settings />
  }

  <!-- Live Workout Overlay -->
  @if ((executionState$ | async)?.isActive || (executionState$ | async)?.finalSummary) {
    <app-live-dashboard />
  }

  <!-- CGU acceptance modal (blocks usage until accepted) -->
  <app-cgu-modal />

  <!-- Push Notification Toasts -->
  <app-notification-toast />

  <!-- Error Toasts -->
  <app-error-toast />
</div>
