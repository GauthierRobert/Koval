<div class="selector-layout">
  <div class="discipline-pills">
    <button class="disc-pill" [class.active]="discipline === 'SWIM'" (click)="setDiscipline('SWIM')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/><path d="M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/></svg>
      {{ 'PACING.DISCIPLINE_SWIM' | translate }}
    </button>
    <button class="disc-pill" [class.active]="discipline === 'BIKE'" (click)="setDiscipline('BIKE')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/></svg>
      {{ 'PACING.DISCIPLINE_BIKE' | translate }}
    </button>
    <button class="disc-pill" [class.active]="discipline === 'RUN'" (click)="setDiscipline('RUN')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 4a1 1 0 1 0 0-2 1 1 0 0 0 0 2zM6 20l3-7 2.5 1.5L15 11l2 5-3 1-2.5-2L8 20H6z"/></svg>
      {{ 'PACING.DISCIPLINE_RUN' | translate }}
    </button>
    <button class="disc-pill tri" [class.active]="discipline === 'TRIATHLON'" (click)="setDiscipline('TRIATHLON')">
      {{ 'PACING.DISCIPLINE_TRIATHLON' | translate }}
    </button>
  </div>
  @if (showBikeType) {
    <div class="bike-type-row animate-in">
      <span class="bt-label">{{ 'PACING.FIELD_BIKE_TYPE_LABEL' | translate }}</span>
      <div class="bike-type-pills">
        <button class="bt-pill" [class.active]="bikeType === 'TT'" (click)="setBikeType('TT')">{{ 'PACING.BIKE_TYPE_TT' | translate }}</button>
        <button class="bt-pill" [class.active]="bikeType === 'ROAD_AERO'" (click)="setBikeType('ROAD_AERO')">{{ 'PACING.BIKE_TYPE_ROAD_AERO' | translate }}</button>
        <button class="bt-pill" [class.active]="bikeType === 'ROAD'" (click)="setBikeType('ROAD')">{{ 'PACING.BIKE_TYPE_ROAD' | translate }}</button>
      </div>
    </div>
  }
</div>
