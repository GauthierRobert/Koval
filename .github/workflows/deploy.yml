name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  GCP_REGION: europe-west1
  ARTIFACT_REPO: training-planner
  IMAGE_NAME: backend

jobs:
  backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: training-planner-backend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          env_vars: |
            SPRING_PROFILES_ACTIVE=prod
            CLUB_FEED_BROKER_TYPE=pubsub
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          secrets: |
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            JWT_SECRET=JWT_SECRET:latest
            MONGODB_URI=MONGODB_URI:latest
            ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
            STRAVA_CLIENT_ID=STRAVA_CLIENT_ID:latest
            STRAVA_CLIENT_SECRET=STRAVA_CLIENT_SECRET:latest
            STRAVA_REDIRECT_URI=STRAVA_REDIRECT_URI:latest
            STRAVA_WEBHOOK_VERIFY_TOKEN=STRAVA_WEBHOOK_VERIFY_TOKEN:latest
            STRAVA_WEBHOOK_CALLBACK_URL=STRAVA_WEBHOOK_CALLBACK_URL:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest
            GOOGLE_MOBILE_CALLBACK_URI=GOOGLE_MOBILE_CALLBACK_URI:latest
            ADMIN_SECRET=ADMIN_SECRET:latest
            FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest
            FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest
          flags: --allow-unauthenticated --port=8080

  frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular app
        working-directory: frontend
        run: npm run build -- --configuration production
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}

  native-android:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Create google-services.json
        working-directory: android/app
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is required"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > google-services.json
          python3 -c "import json; json.load(open('google-services.json'))" || {
            echo "::error::google-services.json is not valid JSON"
            exit 1
          }
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Decode keystore
        working-directory: android/app
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > koval.keystore
          file koval.keystore

      - name: Verify keystore
        working-directory: android/app
        run: |
          keytool -list -keystore koval.keystore \
            -storepass '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -alias '${{ secrets.ANDROID_KEY_ALIAS }}'

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/app/koval.keystore" \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEY_PASSWORD }}'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: koval-android-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
