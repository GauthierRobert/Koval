<!-- Desktop: render chart inline -->
<div class="desktop-only">
  <ng-container *ngTemplateOutlet="chartTpl"></ng-container>
</div>

<!-- Mobile: CTA button -->
<div class="mobile-chart-cta mobile-only">
  <button type="button" class="open-chart-btn" (click)="open = true">
    @if (iconTpl) {
      <ng-container *ngTemplateOutlet="iconTpl"></ng-container>
    } @else {
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
      </svg>
    }
    {{ title }}
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/>
    </svg>
  </button>
  <p class="open-chart-hint">{{ hint ?? ('MOBILE_CHART.HINT' | translate) }}</p>
</div>

<!-- Mobile fullscreen landscape chart overlay -->
@if (open) {
  <div class="mobile-chart-overlay">
    <button type="button" class="mobile-chart-close"
            [attr.aria-label]="'MOBILE_CHART.CLOSE' | translate"
            (click)="open = false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="mobile-chart-content">
      <ng-container *ngTemplateOutlet="chartTpl"></ng-container>
    </div>
  </div>
}
