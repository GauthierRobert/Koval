<div class="detail-gpx-discipline">
  <div class="gpx-discipline-header">
    <span class="gpx-disc-label" [class.gpx-disc-swim]="discipline === 'swim'" [class.gpx-disc-bike]="discipline === 'bike'" [class.gpx-disc-run]="discipline === 'run'">
      {{ discipline | uppercase }}
    </span>
    <!-- Has GPX: green chip + re-upload -->
    @if (hasGpx) {
      <span class="gpx-chip gpx-chip--done">
        &#10003; {{ 'GOALS.GPX_UPLOADED' | translate }}
        <label class="gpx-reupload" [title]="'GOALS.GPX_REPLACE_TITLE' | translate">
          &#8593;
          <input type="file" accept=".gpx" hidden (change)="onFileSelected($event)">
        </label>
      </span>
    }
    <!-- No GPX: upload chip -->
    @if (!hasGpx) {
      <label class="gpx-chip gpx-chip--upload">
        @if (!isUploading) {
          <span>&#8593; {{ 'GOALS.GPX_UPLOAD_LABEL' | translate }}</span>
        }
        @if (isUploading) {
          <span>{{ 'GOALS.GPX_UPLOADING' | translate }}</span>
        }
        <input type="file" accept=".gpx" hidden (change)="onFileSelected($event)">
      </label>
    }
  </div>
  <!-- Map (shown when coords available) -->
  @if (routeCoords && routeCoords.length > 0) {
    <div class="detail-map-container">
      <app-route-map
        [routeCoordinates]="routeCoords"
        [segments]="[]">
      </app-route-map>
    </div>
  }
  @if (hasGpx && (!routeCoords || routeCoords.length === 0)) {
    <div class="detail-map-loading">{{ 'GOALS.MAP_LOADING' | translate }}</div>
  }
</div>
