@if (isOpen) {
  <div class="modal-backdrop" (click)="close()">
    <div class="modal-card glass" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>{{ (isCreateMode ? 'BLOCK_EDITOR.HEADING_ADD' : 'BLOCK_EDITOR.HEADING_EDIT') | translate }} <span class="highlight">{{ 'BLOCK_EDITOR.HEADING_BLOCK' | translate }}</span></h2>
        <button class="close-btn" (click)="close()">&times;</button>
      </div>

      <div class="modal-body">
        <div class="field">
          <label>{{ 'BLOCK_EDITOR.LABEL_TYPE' | translate }}</label>
          <div class="type-pills">
            @for (t of BLOCK_TYPES; track t) {
              <button
                class="type-pill"
                [class.active]="type === t"
                (click)="type = t"
              >
                {{ t }}
              </button>
            }
          </div>
        </div>

        <div class="field">
          <label>{{ 'BLOCK_EDITOR.LABEL_LABEL' | translate }}</label>
          <input type="text" [(ngModel)]="label" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_LABEL' | translate" />
        </div>

        <div class="field-row">
          <div class="field">
            <label>{{ 'BLOCK_EDITOR.LABEL_DURATION' | translate }}</label>
            <div class="duration-inputs">
              <input type="number" [(ngModel)]="durationMinutes" min="0" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_MINUTES' | translate" />
              <span class="duration-sep">:</span>
              <input type="number" [(ngModel)]="durationSeconds" min="0" max="59" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_SECONDS' | translate" />
            </div>
          </div>

          <div class="field">
            <label>{{ 'BLOCK_EDITOR.LABEL_DISTANCE' | translate }} <span class="optional">{{ 'BLOCK_EDITOR.OPTIONAL_METERS' | translate }}</span></label>
            <input type="number" [(ngModel)]="distanceMeters" min="0" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_DISTANCE_METERS' | translate" />
          </div>
        </div>

        @if (!hideIntensity && !isRamp) {
          <div class="field">
            <label>{{ 'BLOCK_EDITOR.LABEL_INTENSITY' | translate }} <span class="optional">{{ 'BLOCK_EDITOR.OPTIONAL_PERCENT' | translate }}</span></label>
            <input type="number" [(ngModel)]="intensityTarget" min="0" max="300" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_INTENSITY' | translate" />
          </div>
        }

        @if (isRamp) {
          <div class="field-row">
            <div class="field">
              <label>{{ 'BLOCK_EDITOR.LABEL_INTENSITY_START' | translate }} <span class="optional">{{ 'BLOCK_EDITOR.OPTIONAL_PERCENT' | translate }}</span></label>
              <input type="number" [(ngModel)]="intensityStart" min="0" max="300" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_INTENSITY_START' | translate" />
            </div>
            <div class="field">
              <label>{{ 'BLOCK_EDITOR.LABEL_INTENSITY_END' | translate }} <span class="optional">{{ 'BLOCK_EDITOR.OPTIONAL_PERCENT' | translate }}</span></label>
              <input type="number" [(ngModel)]="intensityEnd" min="0" max="300" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_INTENSITY_END' | translate" />
            </div>
          </div>
        }

        <div class="field">
          <label>{{ 'BLOCK_EDITOR.LABEL_CADENCE' | translate }} <span class="optional">{{ 'BLOCK_EDITOR.OPTIONAL_CADENCE' | translate }}</span></label>
          <input type="number" [(ngModel)]="cadenceTarget" min="0" max="200" [placeholder]="'BLOCK_EDITOR.PLACEHOLDER_CADENCE' | translate" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="cancel-btn" (click)="close()">{{ 'BLOCK_EDITOR.BTN_CANCEL' | translate }}</button>
        <button class="submit-btn" (click)="save()" [disabled]="!canSave()">
          {{ (isCreateMode ? 'BLOCK_EDITOR.BTN_ADD' : 'BLOCK_EDITOR.BTN_SAVE') | translate }}
        </button>
      </div>
    </div>
  </div>
}
