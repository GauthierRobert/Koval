services:
  mongodb:
    image: mongo:7
    container_name: training-planner-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: training-planner-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    container_name: training-planner-pubsub
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=local-dev
    ports:
      - "8085:8085"

  # Local Google Cloud Storage emulator. Implements the JSON API + V4 signed URLs
  # so the backend's MediaStorageService works the same as in production.
  # See https://github.com/fsouza/fake-gcs-server.
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: training-planner-fake-gcs
    command: >-
      -scheme http
      -public-host localhost:4443
      -port 4443
      -data /data
    ports:
      - "4443:4443"
    volumes:
      - ./fake-gcs-data:/data
    restart: unless-stopped

