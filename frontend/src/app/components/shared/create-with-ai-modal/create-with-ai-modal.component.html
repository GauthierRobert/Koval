<div class="modal-backdrop" *ngIf="isOpen" (click)="close()">
  <div class="modal-panel" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 class="modal-title">
        <span class="ai-icon">✨</span> {{ label }}
      </h2>
      <button class="close-btn" (click)="close()" [disabled]="loading">&times;</button>
    </div>

    <div class="modal-body">
      <!-- Session context banner -->
      <div class="session-context" *ngIf="sessionInfo">
        <div class="context-label">Generating training for:</div>
        <div class="context-details">
          <span *ngIf="sessionInfo.sport" class="context-badge">{{ sessionInfo.sport }}</span>
          <span *ngIf="sessionInfo.scheduledAt" class="context-item">&#x1f4c5; {{ sessionInfo.scheduledAt }}</span>
          <span *ngIf="sessionInfo.clubGroupName" class="context-item">&#x1f465; {{ sessionInfo.clubGroupName }}</span>
        </div>
      </div>

      <p class="hint">Describe what you want to create in natural language.</p>

      <div class="form-group" *ngIf="showSportSelector">
        <label class="field-label">Sport *</label>
        <select class="field-select" [(ngModel)]="selectedSport" (ngModelChange)="onSportChange()" [disabled]="loading">
          <option value="" disabled>Select a sport</option>
          <option *ngFor="let s of sports" [value]="s">{{ s }}</option>
        </select>
      </div>

      <div class="form-group" *ngIf="showSportSelector && filteredZoneSystems.length > 0">
        <label class="field-label">Zone System (optional)</label>
        <select class="field-select" [(ngModel)]="selectedZoneSystemId" [disabled]="loading">
          <option value="">— Sport default —</option>
          <option *ngFor="let z of filteredZoneSystems" [value]="z.id">{{ z.name }}</option>
        </select>
      </div>

      <div class="form-group" *ngIf="showTagSelector && availableGroups.length > 0">
        <label class="field-label">Club Group (optional)</label>
        <select class="field-select" [(ngModel)]="selectedGroupId">
          <option value="">— No group —</option>
          <option *ngFor="let group of availableGroups" [value]="group.id">{{ group.name }}</option>
        </select>
      </div>

      <div class="form-group">
        <label class="field-label">Prompt</label>
        <textarea
          class="prompt-textarea"
          [(ngModel)]="prompt"
          placeholder="e.g. Create a 60-min sweet-spot group ride for Tuesday evening at 7pm"
          rows="4"
          [disabled]="loading"
        ></textarea>
      </div>

      <div class="status-message error" *ngIf="errorMessage">{{ errorMessage }}</div>
      <div class="status-message success" *ngIf="successMessage">{{ successMessage }}</div>
    </div>

    <div class="modal-footer">
      <button class="btn-ghost" (click)="close()" [disabled]="loading">Cancel</button>
      <button
        class="btn-primary"
        (click)="submit()"
        [disabled]="!prompt.trim() || loading || (showSportSelector && !selectedSport)">
        <span *ngIf="!loading">Generate</span>
        <span *ngIf="loading" class="spinner">Generating...</span>
      </button>
    </div>

  </div>
</div>
