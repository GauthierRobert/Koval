@if (rows.length > 0) {
  <div class="clubs-section">
    <div class="clubs-header">
      <span class="clubs-title mono">{{ 'DASHBOARD.MY_CLUBS_TITLE' | translate }} · {{ rows.length }}</span>
      <button type="button" class="clubs-view-all mono" (click)="navigateToClubsList()">
        {{ 'DASHBOARD.CLUBS_VIEW_ALL' | translate }} →
      </button>
    </div>
    <div class="clubs-list glass">
      @for (item of rows; track trackByClubId($index, item); let last = $last) {
        <button
          type="button"
          class="club-row"
          [class.club-row--last]="last"
          (click)="navigateToClub(item.club.id)">
          <span class="club-avatar">{{ getClubInitials(item.club.name) }}</span>
          <span class="club-info">
            <span class="club-name">{{ item.club.name }}</span>
            <span class="club-meta mono">
              @if (item.memberCount != null) {
                {{ 'DASHBOARD.CLUBS_MEMBERS' | translate: { count: item.memberCount } }}
              }
              @if (item.memberCount != null && item.nextSession?.scheduledAt) {
                <span class="meta-sep">·</span>
              }
              @if (item.nextSession?.scheduledAt; as next) {
                <span>{{ 'DASHBOARD.CLUBS_NEXT' | translate }} {{ formatNextSession(next) }}</span>
              } @else if (item.memberCount != null) {
                <span class="meta-quiet">{{ 'DASHBOARD.CLUBS_NO_UPCOMING' | translate }}</span>
              }
            </span>
          </span>
          <span class="club-chevron" aria-hidden="true">›</span>
        </button>
      }
    </div>
  </div>
}
