spring:
  mongodb:
    uri: ${MONGODB_URI}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  ai:
    anthropic:
      chat:
        options:
          temperature: 0.7
          max-tokens: 4096

strava:
  client-id: ${STRAVA_CLIENT_ID:}
  client-secret: ${STRAVA_CLIENT_SECRET:}
  redirect-uri: ${STRAVA_REDIRECT_URI:}
  webhook-verify-token: ${STRAVA_WEBHOOK_VERIFY_TOKEN:}
  webhook-callback-url: ${STRAVA_WEBHOOK_CALLBACK_URL:}

admin:
  secret: ${ADMIN_SECRET:}

garmin:
  consumer-key: ${GARMIN_CONSUMER_KEY:}
  consumer-secret: ${GARMIN_CONSUMER_SECRET:}
  redirect-uri: ${GARMIN_REDIRECT_URI:}

club-feed:
  broker:
    type: pubsub
    pubsub:
      project-id: ${GCP_PROJECT_ID:}

zwift:
  enabled: ${ZWIFT_ENABLED:false}

google:
  redirect-uri: ${GOOGLE_REDIRECT_URI:}
  mobile-callback-uri: ${GOOGLE_MOBILE_CALLBACK_URI:}

firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
  project-id: ${FIREBASE_PROJECT_ID:}

cors:
  allowed-origins: ${ALLOWED_ORIGINS}

app:
  ai:
    debug-calls: false

logging:
  level:
    org.springframework.ai.anthropic.api.AnthropicApi: WARN
    org.springframework.ai.anthropic: WARN
    org.springframework.ai: WARN
    com.koval.trainingplannerbackend: INFO
