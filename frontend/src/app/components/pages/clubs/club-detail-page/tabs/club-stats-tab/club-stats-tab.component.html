<div class="stats-tab">
  <ng-container *ngIf="weeklyStats$ | async as stats; else loadingStats">
    <h4 class="section-title">This Week</h4>
    <div class="stats-grid">
      <div class="stat-card glass">
        <span class="stat-icon">🏊</span>
        <div class="stat-value">{{ stats.totalSwimKm | number:'1.1-1' }}</div>
        <div class="stat-label">Swim km</div>
      </div>
      <div class="stat-card glass">
        <span class="stat-icon">🚴</span>
        <div class="stat-value">{{ stats.totalBikeKm | number:'1.1-1' }}</div>
        <div class="stat-label">Bike km</div>
      </div>
      <div class="stat-card glass">
        <span class="stat-icon">🏃</span>
        <div class="stat-value">{{ stats.totalRunKm | number:'1.1-1' }}</div>
        <div class="stat-label">Run km</div>
      </div>
      <div class="stat-card glass">
        <span class="stat-icon">💪</span>
        <div class="stat-value">{{ stats.totalSessions }}</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>
    <p class="stat-note">{{ stats.memberCount }} active members tracked this week</p>
  </ng-container>
  <ng-template #loadingStats>
    <div class="empty-tab">
      <span>📊</span>
      <p>Loading weekly stats...</p>
    </div>
  </ng-template>
</div>
